<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario</title>
<link rel="stylesheet" href="CSS/style.css">
</head>
<body class="form">
<form>
    <label for="name">Nome: </label>
    <input type="text" id="name">

    <label for="mail">Email:</label>
    <input type="email" id="mail"><br>

<fieldset>
    <legend>Instrumento que você toca:</legend>

    <input name="inst2" type="checkbox" id="piano" value="piano">
    <label for="piano">Piano</label><br>

    <input name="inst2" type="checkbox" id="bateria" value="bateria">
    <label for="bateria">Bateria</label><br>

    <input name="inst2" type="checkbox" id="violao" value="violao">
    <label for="violao">Violão</label><br>

    <input name="inst2" type="checkbox" id="flauta" value="flauta">
    <label for="flauta">Flauta</label><br>

    <input name="inst2" type="checkbox" id="guitarra" value="guitarra">
    <label for="guitarra">Guitarra</label><br>

    <label for="outro">Outro:</label>
    <input type="text" name="inst2" id="outro">
</fieldset><br>

    <label for="af">Artista musical favorito: </label>
    <input type="text" name="artfav" id="af"><br>

    <label for="mf">Música favorita: </label>
    <input type="text" name="musfav" id="mf"><br>

<fieldset>
    <legend>Para você, qual desses é mais essencial em uma boa música?</legend>

    <input name="ess" type="radio" id="melodia" value="melodia">
    <label for="melodia">Melodia</label><br>

    <input name="ess" type="radio" id="harmonia" value="harmonia">
    <label for="harmonia">Harmonia</label><br>

    <input name="ess" type="radio" id="vocais" value="vocais">
    <label for="vocais">Vocais</label><br>

    <input name="ess" type="radio" id="instrumental" value="instrumental">
    <label for="instrumental">Instrumental</label><br>

    <input name="ess" type="radio" id="samples" value="samples">
    <label for="samples">Samples</label><br>

    <input name="ess" type="radio" id="efeitos" value="efeitos">
    <label for="efeitos">Efeitos</label><br>
</fieldset><br>
    <input class="button" type="reset">
    <input class="button" type="submit">
    <a href="index.html">Voltar</a>
</form>
</body>
</html>
